<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Settings</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #09090b;
  --surface: #18181b;
  --border:  #27272a;
  --muted:   #3f3f46;
  --text:    #f4f4f5;
  --sub:     #a1a1aa;
  --dim:     #71717a;
  --accent:  #a78bfa;
  --danger:  #f87171;
  --green:   #4ade80;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
  font-size: 13px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── title bar drag region (macOS) ── */
.titlebar {
  height: 38px;
  flex-shrink: 0;
  -webkit-app-region: drag;
  display: flex;
  align-items: center;
  justify-content: center;
  border-bottom: 1px solid var(--border);
}
.titlebar-text {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  -webkit-user-select: none;
}

/* ── tabs ── */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  padding: 0 16px;
  gap: 0;
}
.tab-btn {
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--dim);
  transition: color 0.15s, border-color 0.15s;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--sub); }
.tab-btn.active { color: var(--text); border-bottom-color: var(--accent); }

/* ── content ── */
.content {
  flex: 1;
  overflow-y: auto;
  padding: 24px 24px 16px;
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.panel { display: none; }
.panel.active { display: block; }

/* ── section headings ── */
.section-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 10px;
}

/* ── about panel ── */
.about-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 24px;
}
.about-icon {
  width: 52px; height: 52px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.about-icon svg { width: 28px; height: 28px; }
.about-name { font-size: 15px; font-weight: 600; }
.about-desc { font-size: 11px; color: var(--sub); margin-top: 2px; }

.info-grid {
  display: grid;
  gap: 1px;
  border: 1px solid var(--border);
  margin-bottom: 20px;
}
.info-row {
  display: flex;
  align-items: center;
  padding: 9px 12px;
  background: var(--surface);
  gap: 12px;
}
.info-row:first-child { border-top: none; }
.info-key {
  font-size: 11px;
  color: var(--dim);
  width: 100px;
  flex-shrink: 0;
}
.info-val {
  font-size: 11px;
  color: var(--sub);
  font-family: "SF Mono", "Fira Code", monospace;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--sub);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  letter-spacing: 0.04em;
}
.btn:hover { background: var(--muted); color: var(--text); border-color: var(--muted); }
.btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn-primary:hover { background: #d4d4d8; border-color: #d4d4d8; color: var(--bg); }
.btn-danger { border-color: transparent; color: var(--danger); }
.btn-danger:hover { background: rgba(248,113,113,0.1); border-color: rgba(248,113,113,0.2); }
.btn-icon { padding: 5px 7px; }

/* ── api keys panel ── */
.key-list { display: flex; flex-direction: column; gap: 1px; }

.key-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
}
.key-provider {
  font-size: 11px;
  font-weight: 500;
  color: var(--sub);
  width: 110px;
  flex-shrink: 0;
  text-transform: capitalize;
}
.key-value {
  flex: 1;
  font-family: "SF Mono", "Fira Code", monospace;
  font-size: 11px;
  color: var(--dim);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.key-actions { display: flex; gap: 4px; flex-shrink: 0; }

.key-empty {
  padding: 32px 16px;
  text-align: center;
  border: 1px dashed var(--border);
  color: var(--dim);
  font-size: 11px;
  line-height: 1.7;
}

/* add key form */
.add-key-form {
  margin-top: 12px;
  border: 1px solid var(--border);
  background: var(--surface);
  padding: 14px;
  display: none;
}
.add-key-form.open { display: block; }
.form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.form-row:last-child { margin-bottom: 0; }
.form-label { font-size: 9px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--dim); }
.form-input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  padding: 7px 10px;
  outline: none;
  font-family: inherit;
  transition: border-color 0.15s;
}
.form-input:focus { border-color: var(--muted); }
.form-input::placeholder { color: var(--muted); }
.form-input[type="password"] { font-family: "SF Mono", "Fira Code", monospace; }
.form-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }

/* inline edit */
.key-edit-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--muted);
  color: var(--text);
  font-size: 11px;
  padding: 4px 8px;
  outline: none;
  font-family: "SF Mono", "Fira Code", monospace;
}

/* ── appearance panel ── */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 20px;
}
.theme-card {
  border: 2px solid var(--border);
  padding: 12px;
  cursor: pointer;
  transition: border-color 0.15s;
  position: relative;
}
.theme-card:hover { border-color: var(--muted); }
.theme-card.active { border-color: var(--accent); }
.theme-card.disabled { opacity: 0.4; cursor: not-allowed; }
.theme-preview {
  height: 48px;
  border-radius: 2px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
}
.theme-preview-dark  { background: linear-gradient(135deg, #09090b 0%, #18181b 50%, #3f3f46 100%); }
.theme-preview-light { background: linear-gradient(135deg, #f9fafb 0%, #e4e4e7 50%, #a1a1aa 100%); }
.theme-preview-auto  { background: linear-gradient(135deg, #09090b 0%, #09090b 50%, #f9fafb 50%, #f9fafb 100%); }
.theme-name { font-size: 11px; font-weight: 500; color: var(--sub); }
.theme-soon {
  position: absolute;
  top: 4px; right: 4px;
  background: var(--muted);
  color: #a1a1aa;
  font-size: 8px;
  padding: 1px 4px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.theme-check {
  position: absolute;
  top: 4px; right: 4px;
  width: 16px; height: 16px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
  align-items: center; justify-content: center;
}
.theme-card.active .theme-check { display: flex; }

/* ── toast ── */
.toast {
  position: fixed;
  bottom: 16px; right: 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 11px;
  padding: 8px 14px;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div class="titlebar">
  <span class="titlebar-text">Settings</span>
</div>

<div class="tabs">
  <button class="tab-btn active" data-tab="about">About</button>
  <button class="tab-btn" data-tab="apikeys">API Keys</button>
  <button class="tab-btn" data-tab="appearance">Appearance</button>
</div>

<div class="content">

  <!-- ── About ── -->
  <div class="panel active" id="panel-about">
    <div class="about-header">
      <div class="about-icon">
        <!-- Infinity icon -->
        <svg viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M100,50 C100,25 82,6 56,6 C30,6 4,24 4,50 C4,76 30,94 56,94 C82,94 100,75 100,50 C100,25 118,6 144,6 C170,6 196,24 196,50 C196,76 170,94 144,94 C118,94 100,75 100,50 Z"
            stroke="#6366f1" stroke-width="6" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="about-name" id="app-name">Infinite Monitor</div>
        <div class="about-desc" id="app-desc">AI-powered dashboard builder</div>
      </div>
    </div>

    <div class="section-label">App Info</div>
    <div class="info-grid">
      <div class="info-row">
        <span class="info-key">Version</span>
        <span class="info-val" id="app-version">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">Platform</span>
        <span class="info-val" id="app-platform">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">Node.js</span>
        <span class="info-val" id="app-node">—</span>
      </div>
      <div class="info-row">
        <span class="info-key">Electron</span>
        <span class="info-val" id="app-electron">—</span>
      </div>
    </div>

    <button class="btn" id="btn-check-updates">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Check for Updates
    </button>
  </div>

  <!-- ── API Keys ── -->
  <div class="panel" id="panel-apikeys">
    <div class="section-label">Configured API Keys</div>

    <div class="key-list" id="key-list">
      <div class="key-empty" id="key-empty">
        No API keys configured.<br>
        Add a key below to get started.
      </div>
    </div>

    <div class="add-key-form" id="add-key-form">
      <div class="form-row">
        <label class="form-label">Provider</label>
        <input class="form-input" id="new-provider" placeholder="e.g. openai, anthropic, google…" autocomplete="off" spellcheck="false">
      </div>
      <div class="form-row">
        <label class="form-label">API Key</label>
        <input class="form-input" id="new-key" type="password" placeholder="sk-…" autocomplete="off" spellcheck="false">
      </div>
      <div class="form-actions">
        <button class="btn" id="btn-cancel-add">Cancel</button>
        <button class="btn btn-primary" id="btn-save-add">Save Key</button>
      </div>
    </div>

    <div style="margin-top:12px">
      <button class="btn" id="btn-show-add-form">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
        Add API Key
      </button>
    </div>
  </div>

  <!-- ── Appearance ── -->
  <div class="panel" id="panel-appearance">
    <div class="section-label">Color Theme</div>
    <div class="theme-grid">
      <div class="theme-card active" data-theme="dark" id="theme-dark">
        <div class="theme-preview theme-preview-dark"></div>
        <div class="theme-name">Dark</div>
        <div class="theme-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <div class="theme-card disabled" data-theme="light" id="theme-light">
        <div class="theme-preview theme-preview-light"></div>
        <div class="theme-name">Light</div>
        <span class="theme-soon">Soon</span>
        <div class="theme-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
      <div class="theme-card disabled" data-theme="auto" id="theme-auto">
        <div class="theme-preview theme-preview-auto"></div>
        <div class="theme-name">System</div>
        <span class="theme-soon">Soon</span>
        <div class="theme-check">
          <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

</div><!-- /content -->

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  // ── tabs ──────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
    });
  });

  // ── toast ─────────────────────────────────────────────────────────────────
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── mask key ─────────────────────────────────────────────────────────────
  function maskKey(k) {
    if (!k) return '';
    if (k.length <= 8) return '••••••••';
    return k.slice(0, 4) + '••••••••' + k.slice(-4);
  }

  // ── render key list ───────────────────────────────────────────────────────
  let allKeys = {}; // provider → key (full)

  function renderKeys() {
    const list  = document.getElementById('key-list');
    const empty = document.getElementById('key-empty');
    const entries = Object.entries(allKeys);

    // Remove existing rows (keep the empty placeholder in DOM)
    list.querySelectorAll('.key-row').forEach(r => r.remove());

    if (entries.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';

    entries.forEach(([provider, key]) => {
      const row = document.createElement('div');
      row.className = 'key-row';
      row.dataset.provider = provider;

      row.innerHTML = `
        <span class="key-provider">${provider}</span>
        <span class="key-value view-mode">${maskKey(key)}</span>
        <input class="key-edit-input edit-mode" type="password" value="${key.replace(/"/g, '&quot;')}" style="display:none">
        <div class="key-actions">
          <button class="btn btn-icon view-mode" title="Edit" data-action="edit">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
              <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
          </button>
          <button class="btn btn-icon edit-mode" title="Save" data-action="save" style="display:none">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
          </button>
          <button class="btn btn-icon btn-danger view-mode" title="Delete" data-action="delete">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14H6L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
          <button class="btn btn-icon edit-mode" title="Cancel" data-action="cancel-edit" style="display:none">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      `;

      // Event listeners
      row.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', () => handleKeyAction(row, btn.dataset.action, provider));
      });

      list.appendChild(row);
    });
  }

  function setEditMode(row, on) {
    row.querySelectorAll('.view-mode').forEach(el => el.style.display = on ? 'none' : '');
    row.querySelectorAll('.edit-mode').forEach(el => el.style.display = on ? '' : 'none');
    if (on) row.querySelector('.key-edit-input').focus();
  }

  async function handleKeyAction(row, action, provider) {
    if (action === 'edit') {
      setEditMode(row, true);
    } else if (action === 'cancel-edit') {
      setEditMode(row, false);
    } else if (action === 'save') {
      const input = row.querySelector('.key-edit-input');
      const newKey = input.value.trim();
      if (!newKey) return;
      await window.settingsAPI.setApiKey(provider, newKey);
      allKeys[provider] = newKey;
      row.querySelector('.key-value').textContent = maskKey(newKey);
      setEditMode(row, false);
      showToast('API key updated');
    } else if (action === 'delete') {
      await window.settingsAPI.removeApiKey(provider);
      delete allKeys[provider];
      renderKeys();
      showToast('API key removed');
    }
  }

  // ── add key form ──────────────────────────────────────────────────────────
  document.getElementById('btn-show-add-form').addEventListener('click', () => {
    const form = document.getElementById('add-key-form');
    form.classList.add('open');
    document.getElementById('new-provider').focus();
    document.getElementById('btn-show-add-form').style.display = 'none';
  });

  document.getElementById('btn-cancel-add').addEventListener('click', () => {
    closeAddForm();
  });

  function closeAddForm() {
    document.getElementById('add-key-form').classList.remove('open');
    document.getElementById('btn-show-add-form').style.display = '';
    document.getElementById('new-provider').value = '';
    document.getElementById('new-key').value = '';
  }

  document.getElementById('btn-save-add').addEventListener('click', async () => {
    const provider = document.getElementById('new-provider').value.trim().toLowerCase();
    const key      = document.getElementById('new-key').value.trim();
    if (!provider || !key) return;
    await window.settingsAPI.setApiKey(provider, key);
    allKeys[provider] = key;
    renderKeys();
    closeAddForm();
    showToast('API key saved');
  });

  // save on Enter in either input
  ['new-provider', 'new-key'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('btn-save-add').click();
    });
  });

  // ── theme ─────────────────────────────────────────────────────────────────
  let currentTheme = 'dark';

  function setActiveTheme(theme) {
    document.querySelectorAll('.theme-card').forEach(c => c.classList.remove('active'));
    const card = document.getElementById('theme-' + theme);
    if (card) card.classList.add('active');
    currentTheme = theme;
  }

  document.querySelectorAll('.theme-card:not(.disabled)').forEach(card => {
    card.addEventListener('click', async () => {
      const theme = card.dataset.theme;
      await window.settingsAPI.setTheme(theme);
      setActiveTheme(theme);
      showToast('Theme updated');
    });
  });

  // ── check updates ─────────────────────────────────────────────────────────
  document.getElementById('btn-check-updates').addEventListener('click', () => {
    window.settingsAPI.checkUpdates();
  });

  // ── init ──────────────────────────────────────────────────────────────────
  async function init() {
    // App info
    const info = await window.settingsAPI.getAppInfo();
    document.getElementById('app-name').textContent    = info.name || 'Infinite Monitor';
    document.getElementById('app-desc').textContent    = info.description || '';
    document.getElementById('app-version').textContent = 'v' + (info.version || '—');
    document.getElementById('app-platform').textContent = navigator.platform || process?.platform || '—';
    document.getElementById('app-node').textContent     = process?.versions?.node    || '—';
    document.getElementById('app-electron').textContent = process?.versions?.electron || '—';

    // API keys + theme
    const data = await window.settingsAPI.getAll();
    allKeys = data.apiKeys || {};
    renderKeys();
    setActiveTheme(data.theme || 'dark');
  }

  init();
})();
</script>
</body>
</html>
