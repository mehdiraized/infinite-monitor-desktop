<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Settings</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #09090b;
				--surface: #18181b;
				--border: #27272a;
				--muted: #3f3f46;
				--text: #f4f4f5;
				--sub: #a1a1aa;
				--dim: #71717a;
				--accent: #a78bfa;
				--danger: #f87171;
				--green: #4ade80;
			}

			body {
				background: var(--bg);
				color: var(--text);
				font-family:
					-apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
					sans-serif;
				font-size: 13px;
				height: 100vh;
				display: flex;
				flex-direction: column;
				overflow: hidden;
				-webkit-font-smoothing: antialiased;
			}

			/* ── title bar drag region (macOS) ── */
			.titlebar {
				height: 38px;
				flex-shrink: 0;
				-webkit-app-region: drag;
				display: flex;
				align-items: center;
				justify-content: center;
				border-bottom: 1px solid var(--border);
			}
			.titlebar-text {
				font-size: 11px;
				font-weight: 500;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--muted);
				-webkit-user-select: none;
			}

			/* ── tabs ── */
			.tabs {
				display: flex;
				border-bottom: 1px solid var(--border);
				flex-shrink: 0;
				padding: 0 16px;
				gap: 0;
			}
			.tab-btn {
				background: none;
				border: none;
				border-bottom: 2px solid transparent;
				padding: 10px 14px;
				cursor: pointer;
				font-size: 11px;
				font-weight: 500;
				letter-spacing: 0.08em;
				text-transform: uppercase;
				color: var(--dim);
				transition:
					color 0.15s,
					border-color 0.15s;
				margin-bottom: -1px;
			}
			.tab-btn:hover {
				color: var(--sub);
			}
			.tab-btn.active {
				color: var(--text);
				border-bottom-color: var(--accent);
			}

			/* ── content ── */
			.content {
				flex: 1;
				overflow-y: auto;
				padding: 24px 24px 16px;
			}
			.content::-webkit-scrollbar {
				width: 4px;
			}
			.content::-webkit-scrollbar-track {
				background: transparent;
			}
			.content::-webkit-scrollbar-thumb {
				background: var(--border);
				border-radius: 2px;
			}

			.panel {
				display: none;
			}
			.panel.active {
				display: block;
			}

			/* ── section headings ── */
			.section-label {
				font-size: 9px;
				font-weight: 600;
				letter-spacing: 0.18em;
				text-transform: uppercase;
				color: var(--dim);
				margin-bottom: 10px;
			}

			/* ── about panel ── */
			.about-header {
				display: flex;
				align-items: center;
				gap: 14px;
				margin-bottom: 24px;
			}
			.about-icon {
				width: 52px;
				height: 52px;
				border: 1px solid var(--border);
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
			}
			.about-icon svg {
				width: 28px;
				height: 28px;
			}
			.about-name {
				font-size: 15px;
				font-weight: 600;
			}
			.about-desc {
				font-size: 11px;
				color: var(--sub);
				margin-top: 2px;
			}

			.info-grid {
				display: grid;
				gap: 1px;
				border: 1px solid var(--border);
				margin-bottom: 20px;
			}
			.info-row {
				display: flex;
				align-items: center;
				padding: 9px 12px;
				background: var(--surface);
				gap: 12px;
			}
			.info-row:first-child {
				border-top: none;
			}
			.info-key {
				font-size: 11px;
				color: var(--dim);
				width: 100px;
				flex-shrink: 0;
			}
			.info-val {
				font-size: 11px;
				color: var(--sub);
				font-family: "SF Mono", "Fira Code", monospace;
			}

			.btn {
				display: inline-flex;
				align-items: center;
				gap: 6px;
				padding: 7px 14px;
				border: 1px solid var(--border);
				background: var(--surface);
				color: var(--sub);
				font-size: 11px;
				font-weight: 500;
				cursor: pointer;
				transition:
					background 0.15s,
					color 0.15s,
					border-color 0.15s;
				letter-spacing: 0.04em;
			}
			.btn:hover {
				background: var(--muted);
				color: var(--text);
				border-color: var(--muted);
			}
			.btn-primary {
				background: var(--text);
				color: var(--bg);
				border-color: var(--text);
			}
			.btn-primary:hover {
				background: #d4d4d8;
				border-color: #d4d4d8;
				color: var(--bg);
			}
			.btn-danger {
				border-color: transparent;
				color: var(--danger);
			}
			.btn-danger:hover {
				background: rgba(248, 113, 113, 0.1);
				border-color: rgba(248, 113, 113, 0.2);
			}
			.btn-icon {
				padding: 5px 7px;
			}

			/* ── api keys panel ── */
			.key-list {
				display: flex;
				flex-direction: column;
				gap: 1px;
			}

			.key-row {
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				background: var(--surface);
				border: 1px solid var(--border);
			}
			.key-provider {
				font-size: 11px;
				font-weight: 500;
				color: var(--sub);
				width: 110px;
				flex-shrink: 0;
				text-transform: capitalize;
			}
			.key-value {
				flex: 1;
				font-family: "SF Mono", "Fira Code", monospace;
				font-size: 11px;
				color: var(--dim);
				overflow: hidden;
				text-overflow: ellipsis;
				white-space: nowrap;
			}
			.key-actions {
				display: flex;
				gap: 4px;
				flex-shrink: 0;
			}

			.key-empty {
				padding: 32px 16px;
				text-align: center;
				border: 1px dashed var(--border);
				color: var(--dim);
				font-size: 11px;
				line-height: 1.7;
			}

			/* add key form */
			.add-key-form {
				margin-top: 12px;
				border: 1px solid var(--border);
				background: var(--surface);
				padding: 14px;
				display: none;
			}
			.add-key-form.open {
				display: block;
			}
			.form-row {
				display: flex;
				flex-direction: column;
				gap: 4px;
				margin-bottom: 10px;
			}
			.form-row:last-child {
				margin-bottom: 0;
			}
			.form-label {
				font-size: 9px;
				font-weight: 600;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				color: var(--dim);
			}
			.form-input {
				background: var(--bg);
				border: 1px solid var(--border);
				color: var(--text);
				font-size: 12px;
				padding: 7px 10px;
				outline: none;
				font-family: inherit;
				transition: border-color 0.15s;
			}
			.form-input:focus {
				border-color: var(--muted);
			}
			.form-input::placeholder {
				color: var(--muted);
			}
			.form-input[type="password"] {
				font-family: "SF Mono", "Fira Code", monospace;
			}
			.form-actions {
				display: flex;
				justify-content: flex-end;
				gap: 8px;
				margin-top: 12px;
				padding-top: 10px;
				border-top: 1px solid var(--border);
			}

			/* inline edit */
			.key-edit-input {
				flex: 1;
				background: var(--bg);
				border: 1px solid var(--muted);
				color: var(--text);
				font-size: 11px;
				padding: 4px 8px;
				outline: none;
				font-family: "SF Mono", "Fira Code", monospace;
			}

			/* ── appearance panel ── */
			.theme-grid {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 8px;
				margin-bottom: 20px;
			}
			.theme-card {
				border: 2px solid var(--border);
				padding: 12px;
				cursor: pointer;
				transition: border-color 0.15s;
				position: relative;
			}
			.theme-card:hover {
				border-color: var(--muted);
			}
			.theme-card.active {
				border-color: var(--accent);
			}
			.theme-card.disabled {
				opacity: 0.4;
				cursor: not-allowed;
			}
			.theme-preview {
				height: 48px;
				border-radius: 2px;
				margin-bottom: 8px;
				position: relative;
				overflow: hidden;
			}
			.theme-preview-dark {
				background: linear-gradient(
					135deg,
					#09090b 0%,
					#18181b 50%,
					#3f3f46 100%
				);
			}
			.theme-preview-light {
				background: linear-gradient(
					135deg,
					#f9fafb 0%,
					#e4e4e7 50%,
					#a1a1aa 100%
				);
			}
			.theme-preview-auto {
				background: linear-gradient(
					135deg,
					#09090b 0%,
					#09090b 50%,
					#f9fafb 50%,
					#f9fafb 100%
				);
			}
			.theme-name {
				font-size: 11px;
				font-weight: 500;
				color: var(--sub);
			}
			.theme-soon {
				position: absolute;
				top: 4px;
				right: 4px;
				background: var(--muted);
				color: #a1a1aa;
				font-size: 8px;
				padding: 1px 4px;
				letter-spacing: 0.08em;
				text-transform: uppercase;
			}
			.theme-check {
				position: absolute;
				top: 4px;
				right: 4px;
				width: 16px;
				height: 16px;
				background: var(--accent);
				border-radius: 50%;
				display: none;
				align-items: center;
				justify-content: center;
			}
			.theme-card.active .theme-check {
				display: flex;
			}

			/* ── toast ── */
			.toast {
				position: fixed;
				bottom: 16px;
				right: 16px;
				background: var(--surface);
				border: 1px solid var(--border);
				color: var(--text);
				font-size: 11px;
				padding: 8px 14px;
				opacity: 0;
				transform: translateY(6px);
				transition:
					opacity 0.2s,
					transform 0.2s;
				pointer-events: none;
				z-index: 100;
			}
			.toast.show {
				opacity: 1;
				transform: translateY(0);
			}
		</style>
	</head>
	<body>
		<div id="root"></div>
		<script src="./settings-renderer.js"></script>
	</body>
</html>
