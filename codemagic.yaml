workflows:
  mac-app-store:
    name: Mac App Store (MAS)
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      node: 22.0.0
      vars:
        BUNDLE_ID: com.infinitemonitor.desktop
        APP_STORE_CONNECT_KEY_ID: Paste_Your_Key_ID_Here
        APP_STORE_CONNECT_ISSUER_ID: Paste_Your_Issuer_ID_Here
        NEXT_TELEMETRY_DISABLED: "1"
        NODE_OPTIONS: "--max-old-space-size=8192"
      groups:
        # Create this group in Codemagic dashboard → Teams → Environment variables:
        #   APP_STORE_CONNECT_PRIVATE_KEY  — contents of .p8 key file (mark as secret)
        #   CERTIFICATE_PRIVATE_KEY        — contents of private key used to create Mac App Distribution cert (mark as secret)
        - mas_credentials

    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: "v*.*.*"
          include: true

    scripts:
      - name: Install pnpm
        script: |
          npm install -g pnpm@10

      - name: Setup git submodule
        script: |
          git submodule update --init --recursive

      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile

      - name: Fetch Mac App Distribution certificate via App Store Connect API
        # Codemagic fetches the certificate automatically when you add it to the
        # "iOS certificates, identifiers & profiles" section in the dashboard.
        # This step decodes the provisioning profile and sets up the signing identity.
        script: |
          # Decode the provisioning profile from environment variable
          # Set MAS_PROVISIONING_PROFILE to the decoded file path
          echo "$MAS_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/mas.provisionprofile
          export MAS_PROVISIONING_PROFILE=/tmp/mas.provisionprofile

      - name: Build for Mac App Store
        script: |
          # Decode provisioning profile for electron-builder
          echo "$MAS_PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/mas.provisionprofile

          pnpm run build:mac:store
        env:
          MAS_PROVISIONING_PROFILE: /tmp/mas.provisionprofile
          # Codemagic automatically sets CSC_LINK and CSC_KEY_PASSWORD
          # from the certificate you add in the dashboard

    artifacts:
      - dist/*.pkg
      - dist/*.zip

    publishing:
      app_store_connect:
        # The API key must be added in Codemagic App Store Connect integrations:
        # Teams → Integrations → App Store Connect → Add API key
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        # submit_to_testflight: true    # for TestFlight
        submit_to_app_store: true       # direct MAS submission
      email:
        recipients:
          - hi@infinitemonitor.app
        notify:
          success: true
          failure: true
