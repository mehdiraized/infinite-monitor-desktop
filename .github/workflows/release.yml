name: Release

# Triggered when:
#   1. A version tag is pushed manually (e.g. v1.2.3)
#   2. Code is pushed to main (auto-bumps patch version → tag → build)
on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  # ── Auto-tag: bump patch version on push to main (skip if already tagged) ──
  auto-tag:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      skipped: ${{ steps.check.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if HEAD is already tagged
        id: check
        run: |
          if git describe --tags --exact-match HEAD 2>/dev/null; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "HEAD is already tagged — skipping auto-tag."
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node 22
        if: steps.check.outputs.skipped == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version, tag, and push
        if: steps.check.outputs.skipped == 'false'
        id: tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          NEW_VERSION=$(node -p "require('./package.json').version")
          TAG="v${NEW_VERSION}"
          git add package.json
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin main --follow-tags
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Created and pushed tag ${TAG}"

  # ── macOS build (produces .dmg + .zip for x64 and arm64) ──────────────────
  build-mac:
    # Use macos-14 (ARM64).  macos-13 is deprecated.  USE_HARD_LINKS=false
    # prevents hdiutil detach race conditions during DMG creation.
    # Runs on tag push (manual) or after auto-tag (push to main)
    if: >-
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.skipped == 'false')
      )
    needs: [auto-tag]
    runs-on: macos-14
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      NEXT_TELEMETRY_DISABLED: 1
      USE_HARD_LINKS: "false"
      # Use the system Python for dmg-builder instead of its bundled Python 3.14,
      # which has a stricter plistlib that fails to parse hdiutil output.
      PYTHON_PATH: /usr/bin/python3
    steps:
      - name: Checkout desktop repo + web submodule
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref }}
          submodules: "recursive"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .web-runtime/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('web/src/**', 'overlay/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build macOS
        run: pnpm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # skip code signing in CI

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: error

  # ── Windows build (produces .exe NSIS installer for x64) ──────────────────
  build-win:
    if: >-
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.skipped == 'false')
      )
    needs: [auto-tag]
    runs-on: windows-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout desktop repo + web submodule
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref }}
          submodules: "recursive"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .web-runtime/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('web/src/**', 'overlay/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Windows
        run: pnpm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-builds
          path: dist/*.exe
          if-no-files-found: error

  # ── Linux build (produces .AppImage + .deb for x64) ───────────────────────
  build-linux:
    if: >-
      always() && (
        startsWith(github.ref, 'refs/tags/v')
        || (needs.auto-tag.result == 'success' && needs.auto-tag.outputs.skipped == 'false')
      )
    needs: [auto-tag]
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: "--max-old-space-size=8192"
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout desktop repo + web submodule
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref }}
          submodules: "recursive"

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .web-runtime/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('web/src/**', 'overlay/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml') }}-
            ${{ runner.os }}-nextjs-

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build Linux
        run: pnpm run build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  # ── Create GitHub Release with all artifacts ──────────────────────────────
  release:
    needs: [auto-tag, build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.auto-tag.outputs.tag || github.ref_name }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - name: List artifacts
        run: ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.tag || github.ref_name }}
          files: dist/**
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(needs.auto-tag.outputs.tag || github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
